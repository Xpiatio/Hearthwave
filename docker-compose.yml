# Pin the Compose project name so `docker compose` from this directory always
# targets the same stack. Without this, the project defaults to the directory
# name (e.g. 'radio-tty'), which spins up a parallel stack that collides on
# port 80 with an install started under a different name.
name: hearthwave

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        COMPUTE_BACKEND: ${COMPUTE_BACKEND:-cpu}
    volumes:
      - ./data:/data
      - ./Voices:/app/Voices:ro
      # All Whisper models live here, including the optional two-tier
      # final-pass model. Stage both in one run:
      #   bash setup.sh --final-model distil-large-v3
      # then set whisper_model_final in data/config.json (or via the Server
      # Config panel). The final model lazy-loads on first finalized utterance
      # and adds ~1.5 GB RAM only while active.
      - ./Models:/app/backend/Models:ro
      # setup.sh writes PULSE_UID to .env — run it once before docker compose up
      - /run/user/${PULSE_UID:-1000}/pulse:/run/pulse:ro
    environment:
      - PULSE_SERVER=unix:/run/pulse/native
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-10.3.0}
    devices:
      - /dev/snd:/dev/snd
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "${RENDER_GID:-992}"
    restart: unless-stopped
    networks:
      - radio
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:8080"
    volumes:
      - ./data:/data:ro
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - radio

networks:
  radio:
    driver: bridge
